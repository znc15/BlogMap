<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>足迹 · 我的旅行相册</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

<style>
  :root {
    --bg: #222831;
    --bg-soft: #2C333B;
    --card: #393E46;
    --accent: #D65A31;
    --accent-soft: #4C3D37;
    --accent-deep: #B84A28;
    --text: #EEEEEE;
    --text-muted: #AAA9A5;
    --text-light: #6B6A66;
    --border: #3A3F47;
    --border-light: #32373E;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.25), 0 2px 6px rgba(0,0,0,0.18);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.35), 0 8px 28px rgba(0,0,0,0.25);
    --shadow-lg: 0 16px 40px rgba(0,0,0,0.45), 0 32px 72px rgba(0,0,0,0.35);
    --radius: 2px;
    --radius-lg: 4px;
    --serif: "Noto Serif SC", "Source Serif Pro", Georgia, "Times New Roman", serif;
    --sans: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 66% 50% at 15% 0%, rgba(214,90,49,0.06), transparent 50%),
      radial-gradient(ellipse 60% 48% at 85% 100%, rgba(214,90,49,0.04), transparent 50%);
  }

  /* ---------- 顶部导航 ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    background: rgba(34, 40, 49, 0.82);
    border-bottom: 1px solid transparent;
    transition: border-color .3s, background .3s;
  }
  header.scrolled { border-bottom-color: var(--border); }
  .nav {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 1.2rem;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 4px rgba(201, 100, 66, 0.15);
  }
  .nav-stats {
    font-size: 0.85rem;
    color: var(--text-muted);
    display: flex;
    gap: 18px;
  }
  .nav-stats b {
    color: var(--accent);
    font-weight: 600;
    font-family: var(--serif);
  }
  @media (max-width: 600px) {
    .nav-stats { display: none; }
  }

  /* ---------- 主体 ---------- */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ---------- Hero ---------- */
  .hero {
    text-align: center;
    padding: 64px 0 32px;
  }
  .hero-eyebrow {
    font-size: 0.82rem;
    letter-spacing: 0.28em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 18px;
    font-weight: 500;
  }
  .hero h1 {
    font-family: var(--serif);
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 20px;
  }
  .hero h1 .ink {
    color: var(--accent);
    font-style: italic;
  }
  .hero-sub {
    max-width: 560px;
    margin: 0 auto;
    color: var(--text-muted);
    font-size: 1.02rem;
    line-height: 1.75;
  }

  /* ---------- 地图区 ---------- */
  .map-section {
    margin-top: 36px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    overflow: hidden;
    position: relative;
  }
  .map-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .map-title {
    font-family: var(--serif);
    font-size: 1.15rem;
    font-weight: 600;
  }
  .map-legend {
    display: flex;
    gap: 18px;
    font-size: 0.82rem;
    color: var(--text-muted);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch {
    width: 14px; height: 14px; border-radius: 4px;
    border: 1px solid rgba(0,0,0,0.06);
  }
  .legend-visited { background: var(--accent); }
  .legend-other { background: #2C333B; }

  #map {
    width: 100%;
    height: 620px;
  }
  @media (max-width: 768px) {
    #map { height: 460px; }
    .map-header { padding: 16px 18px; }
  }

  .map-tip {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(238,238,238,0.94);
    color: #222831;
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 0.82rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity .3s;
  }
  .map-tip.show { opacity: 1; }

  /* ---------- 已去过省份卡片列表 ---------- */
  .quick-list {
    margin-top: 40px;
  }
  .section-title {
    font-family: var(--serif);
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title::before {
    content: '';
    width: 4px; height: 22px;
    background: var(--accent);
    border-radius: 2px;
  }
  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .pill {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 0.92rem;
    cursor: pointer;
    transition: all .2s;
    color: var(--text);
  }
  .pill:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }
  .pill .count {
    color: var(--text-light);
    font-size: 0.8rem;
    margin-left: 6px;
  }

  /* ---------- 详情面板（覆盖式） ---------- */
  .detail-panel {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    overflow-y: auto;
    opacity: 0;
    pointer-events: none;
    transform: translateY(20px);
    transition: opacity .35s ease, transform .35s ease;
  }
  .detail-panel.open {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }
  .detail-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }
  .detail-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 0.95rem;
    cursor: pointer;
    padding: 8px 0;
    font-family: var(--sans);
    transition: color .2s;
  }
  .detail-back:hover { color: var(--accent); }

  .detail-header {
    margin-top: 24px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }
  .detail-eyebrow {
    color: var(--accent);
    font-size: 0.82rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .detail-title {
    font-family: var(--serif);
    font-size: clamp(2rem, 4.5vw, 3rem);
    font-weight: 600;
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
  }
  .detail-meta {
    color: var(--text-muted);
    font-size: 0.95rem;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }
  .detail-meta span { display: inline-flex; align-items: center; gap: 6px; }

  .detail-diary {
    margin: 36px 0;
    font-family: var(--serif);
    font-size: 1.08rem;
    line-height: 1.95;
    color: var(--text);
    max-width: 720px;
  }
  .detail-diary p { margin-bottom: 1.1em; }
  .detail-diary p:first-letter {
    font-size: 2.2em;
    float: left;
    line-height: 1;
    padding: 4px 8px 0 0;
    font-weight: 600;
    color: var(--accent);
  }

  /* ---------- 瀑布流相册 ---------- */
  .gallery {
    column-count: 3;
    column-gap: 16px;
    margin-top: 24px;
  }
  @media (max-width: 900px) { .gallery { column-count: 2; } }
  @media (max-width: 520px) { .gallery { column-count: 1; } }

  .photo {
    break-inside: avoid;
    margin-bottom: 24px;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--card);
    box-shadow: var(--shadow-sm);
    cursor: zoom-in;
    position: relative;
    transition: transform .35s, box-shadow .35s, filter .35s;
  }
  .photo::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 2px solid rgba(238,238,238,0.05);
    border-radius: var(--radius);
    pointer-events: none;
    z-index: 1;
    transition: border-color .35s;
  }
  .photo:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
  .photo:hover::after { border-color: rgba(238,238,238,0.13); }
  .photo:hover img { filter: brightness(1.07); }
  .photo img {
    width: 100%;
    display: block;
    transition: filter .35s;
  }
  .photo .photo-meta {
    padding: 12px 14px 14px;
    border-top: 1px solid var(--border);
  }
  .photo-caption {
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 4px;
  }
  .photo-info {
    font-size: 0.78rem;
    color: var(--text-light);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* ---------- 灯箱 ---------- */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(20, 20, 18, 0.94);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    flex-direction: column;
    padding: 30px;
  }
  .lightbox.open { opacity: 1; pointer-events: auto; }
  .lightbox img {
    max-width: 100%;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .lightbox-caption {
    color: #ddd;
    margin-top: 18px;
    text-align: center;
    max-width: 720px;
    font-size: 0.95rem;
  }
  .lightbox-caption small { color: #888; display: block; margin-top: 4px; }
  .lightbox-close {
    position: absolute;
    top: 22px; right: 22px;
    width: 42px; height: 42px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    font-size: 1.4rem;
    cursor: pointer;
    transition: background .2s;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.2); }
  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: none;
    color: #fff;
    font-size: 1.5rem;
    cursor: pointer;
    transition: background .2s;
  }
  .lightbox-nav:hover { background: rgba(255,255,255,0.18); }
  .lightbox-nav.prev { left: 24px; }
  .lightbox-nav.next { right: 24px; }
  @media (max-width: 600px) {
    .lightbox-nav { width: 38px; height: 38px; font-size: 1.2rem; }
    .lightbox-nav.prev { left: 8px; }
    .lightbox-nav.next { right: 8px; }
  }

  /* ---------- 银盐颗粒 ---------- */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.22;
    mix-blend-mode: screen;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='3' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.25 0 0 0 0 0.25 0 0 0 0 0.25 0 0 0 0.18 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ---------- 地图灯火效果 ---------- */
  .map-section { isolation: isolate; }
  .map-section::after {
    content: '';
    position: absolute;
    inset: 60px 0 0 0;
    pointer-events: none;
    background: radial-gradient(ellipse 70% 55% at 50% 55%, transparent 0%, transparent 55%, rgba(34,40,49,0.55) 100%);
    z-index: 1;
  }

  /* 重新登场动画：每个元素错峰浮现 */
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hero, .map-section, .quick-list, .timeline-section {
    animation: riseIn .9s ease both;
  }
  .map-section { animation-delay: .15s; }
  .timeline-section { animation-delay: .3s; }
  .quick-list { animation-delay: .45s; }

  /* ---------- 时间轴 ---------- */
  .timeline-section { margin-top: 56px; }
  .timeline-rail {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 16px 22px;
    box-shadow: var(--shadow-sm);
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--accent-soft) transparent;
  }
  .timeline-rail::-webkit-scrollbar { height: 6px; }
  .timeline-rail::-webkit-scrollbar-track { background: transparent; }
  .timeline-rail::-webkit-scrollbar-thumb { background: var(--accent-soft); border-radius: 3px; }
  .timeline-track {
    display: flex;
    gap: 18px;
    padding: 22px 6px 10px;
    min-width: max-content;
    position: relative;
  }
  .timeline-track::before {
    content: '';
    position: absolute;
    top: 36px;
    left: 18px; right: 18px;
    height: 1.5px;
    background: repeating-linear-gradient(90deg, var(--accent-soft) 0 8px, transparent 8px 18px);
    z-index: 0;
  }
  .timeline-node {
    position: relative;
    z-index: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 18px 14px;
    min-width: 168px;
    cursor: pointer;
    transition: all .25s;
  }
  .timeline-node::before {
    content: '';
    position: absolute;
    top: 7px; left: 50%;
    transform: translateX(-50%);
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 4px var(--bg), 0 0 0 6px var(--accent-soft);
    transition: transform .25s;
  }
  .timeline-node:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: var(--shadow-md);
  }
  .timeline-node:hover::before { transform: translateX(-50%) scale(1.2); }
  .timeline-date {
    font-family: var(--serif);
    font-size: 0.78rem;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .timeline-place {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .timeline-count {
    font-size: 0.76rem;
    color: var(--text-muted);
  }

  /* ---------- 悬浮按钮 ---------- */
  .fab {
    position: fixed;
    bottom: 28px; right: 28px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    box-shadow: 0 6px 20px rgba(214,90,49,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
    cursor: pointer;
    z-index: 60;
    transition: transform .25s, box-shadow .25s;
    display: flex; align-items: center; justify-content: center;
  }
  .fab:hover {
    transform: translateY(-3px) rotate(12deg);
    box-shadow: 0 12px 28px rgba(214,90,49,0.45);
  }
  .fab svg { width: 22px; height: 22px; }
  @media (max-width: 600px) { .fab { bottom: 20px; right: 20px; width: 52px; height: 52px; } }

  /* ---------- 上传抽屉 ---------- */
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(20,20,18,0.4);
    opacity: 0; pointer-events: none;
    z-index: 150;
    transition: opacity .3s;
    backdrop-filter: blur(2px);
  }
  .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed;
    top: 0; right: 0;
    width: min(460px, 100vw);
    height: 100vh;
    background: var(--bg);
    z-index: 160;
    transform: translateX(100%);
    transition: transform .35s cubic-bezier(.2,.7,.2,1);
    display: flex; flex-direction: column;
    box-shadow: -20px 0 60px rgba(0,0,0,0.15);
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head {
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .drawer-title {
    font-family: var(--serif);
    font-size: 1.2rem;
    font-weight: 600;
  }
  .drawer-close {
    background: transparent; border: none;
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 1.3rem;
    cursor: pointer;
    color: var(--text-muted);
    transition: background .2s;
  }
  .drawer-close:hover { background: var(--bg-soft); color: var(--accent); }
  .drawer-body { flex: 1; overflow-y: auto; padding: 22px 24px 30px; }
  .drawer-tabs {
    display: flex; gap: 4px;
    background: var(--bg-soft);
    padding: 4px;
    border-radius: 10px;
    margin-bottom: 22px;
  }
  .drawer-tab {
    flex: 1;
    padding: 8px;
    border: none;
    background: transparent;
    border-radius: 7px;
    font-family: var(--sans);
    font-size: 0.88rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .2s;
  }
  .drawer-tab.active {
    background: var(--card);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }
  .field { margin-bottom: 16px; }
  .field-label {
    display: block;
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .field-input, .field-select, .field-textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    font-family: var(--sans);
    font-size: 0.93rem;
    color: var(--text);
    transition: border-color .2s;
  }
  .field-textarea { resize: vertical; min-height: 90px; font-family: var(--serif); line-height: 1.6; }
  .field-input:focus, .field-select:focus, .field-textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all .25s;
    background: var(--card);
    color: var(--text-muted);
  }
  .drop-zone:hover, .drop-zone.dragging {
    border-color: var(--accent);
    background: rgba(214,90,49,0.08);
    color: var(--accent);
  }
  .drop-zone-icon { font-size: 1.8rem; margin-bottom: 6px; opacity: 0.6; }
  .drop-zone-hint { font-size: 0.85rem; }
  .drop-zone-sub { font-size: 0.75rem; margin-top: 4px; color: var(--text-light); }
  .queue { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }
  .queue-item {
    display: flex; gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
  }
  .queue-thumb {
    width: 78px; height: 78px;
    flex-shrink: 0;
    border-radius: 8px;
    object-fit: cover;
    background: var(--bg-soft);
  }
  .queue-body { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .queue-body input {
    width: 100%; border: none; background: transparent;
    font-family: var(--sans);
    padding: 3px 0;
    border-bottom: 1px solid transparent;
  }
  .queue-body input:focus { outline: none; border-bottom-color: var(--accent-soft); }
  .queue-body input[data-k="caption"] { font-size: 0.92rem; color: var(--text); }
  .queue-body input[data-k="location"], .queue-body input[data-k="time"] {
    font-size: 0.76rem; color: var(--text-muted);
  }
  .queue-remove {
    background: transparent; border: none;
    color: var(--text-light); cursor: pointer;
    padding: 4px 8px; font-size: 1.1rem;
  }

  const m = s.match(/(\d{4})\D+(\d{1,2})/);
  return m ? { y: +m[1], m: +m[2], key: +m[1] * 100 + +m[2] } : { y: 9999, m: 12, key: 999912 };
}

  renderPills();
  renderTimeline();
  renderMap();
  renderProvinceSelect();
}

function renderPills() {
  const pillsEl = document.getElementById('pills');
  pillsEl.innerHTML = '';
  TRAVEL_DATA.forEach(d => {
    const el = document.createElement('div');
    el.className = 'pill';
    el.innerHTML = `${d.display}<span class="count">${d.photos.length} 张</span>`;
    el.onclick = () => openDetail(d.province);
    pillsEl.appendChild(el);
  });
}

function renderTimeline() {
  const track = document.getElementById('timelineTrack');
  const sorted = [...TRAVEL_DATA].sort((a, b) => parsePeriod(a.period).key - parsePeriod(b.period).key);
  track.innerHTML = sorted.map(d => {
    const p = parsePeriod(d.period);
    return `
      <div class="timeline-node" onclick="openDetail('${d.province}')">
        <div class="timeline-date">${p.y} · ${String(p.m).padStart(2,'0')}月</div>
        <div class="timeline-place">${d.display}</div>
        <div class="timeline-count">${d.photos.length} 张照片</div>
      </div>
    `;
  }).join('');
}

// header 滚动效果
const headerEl = document.getElementById('header');
window.addEventListener('scroll', () => {
  headerEl.classList.toggle('scrolled', window.scrollY > 10);
});

/* ====================== 地图 ====================== */

const chart = echarts.init(document.getElementById('map'));
const mapTip = document.getElementById('mapTip');
let geoLoaded = false;

fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
  .then(r => r.json())
  .then(geo => {
    echarts.registerMap('china', geo);
    geoLoaded = true;
    renderMap();
  })
  .catch(err => {
    document.getElementById('map').innerHTML =
      '<div style="padding:60px;text-align:center;color:var(--text-muted)">地图数据加载失败，请检查网络。<br/>错误：' + err.message + '</div>';
  });

function renderMap() {
  if (!geoLoaded) return;

  const seriesData = TRAVEL_DATA.map(d => ({
    name: d.province,
    value: d.photos.length
  }));

  // 灯火标记（已去过的省份发光的小圆点）
  const lanternData = TRAVEL_DATA
    .filter(d => PROVINCE_CENTERS[d.province])
    .map(d => ({
      name: d.display,
      province: d.province,
      value: [...PROVINCE_CENTERS[d.province], d.photos.length]
    }));

  // 旅行轨迹（按时间顺序连线）
  const sortedTravels = [...TRAVEL_DATA]
    .filter(d => PROVINCE_CENTERS[d.province])
    .sort((a, b) => parsePeriod(a.period).key - parsePeriod(b.period).key);
  const trailData = [];
  for (let i = 0; i < sortedTravels.length - 1; i++) {
    trailData.push({
      coords: [PROVINCE_CENTERS[sortedTravels[i].province], PROVINCE_CENTERS[sortedTravels[i + 1].province]]
    });
  }

  chart.setOption({
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'item',
      backgroundColor: 'rgba(34,40,49,0.98)',
      borderColor: 'transparent',
      textStyle: { color: '#EEEEEE', fontFamily: 'inherit', fontSize: 13 },
      padding: [10, 14],
      formatter: (p) => {
        const name = p.data?.province || p.name;
        const d = dataMap[name];
        if (d) return `<b style="font-family:'Noto Serif SC',serif;font-size:15px">${d.display}</b><br/><span style="color:#D65A31">${d.period}</span><br/><span style="color:#EEEEEE">${d.photos.length} 张照片 · 点击查看</span>`;
        return `<span style="color:#6B6A66">${p.name}</span><br/><span style="color:#AAA9A5;font-size:12px">尚未点亮</span>`;
      }
    },
    geo: {
      map: 'china',
      roam: true,
      scaleLimit: { min: 1, max: 4 },
      zoom: 1.18,
      itemStyle: {
        areaColor: '#2C333B',
        borderColor: '#3A3F47',
        borderWidth: 0.6
      },
      emphasis: {
        itemStyle: { areaColor: '#393E46' },
        label: { show: false }
      },
      select: { disabled: true }
    },
    series: [
      // 1. 已去过省份 —— 发光填色
      {
        type: 'map',
        map: 'china',
        geoIndex: 0,
        data: seriesData,
        itemStyle: {
          areaColor: '#D65A31',
          borderColor: '#393E46',
          borderWidth: 1.2,
          shadowColor: 'rgba(214,90,49,0.40)',
          shadowBlur: 22
        },
        emphasis: {
          itemStyle: { areaColor: '#B84A28', borderWidth: 1.5, shadowBlur: 30 },
          label: { show: true, color: '#EEEEEE', fontWeight: 'bold', fontFamily: 'Noto Serif SC', fontSize: 13 }
        },
        select: { disabled: true },
        animationDuration: 1200,
        animationEasing: 'cubicOut'
      },
      // 2. 旅行轨迹流光
      {
        type: 'lines',
        coordinateSystem: 'geo',
        zlevel: 1,
        polyline: false,
        effect: {
          show: true,
          period: 5,
          trailLength: 0.5,
          symbolSize: 5,
          color: '#D65A31',
          symbol: 'circle'
        },
        lineStyle: {
          color: '#D65A31',
          width: 1.4,
          opacity: 0.40,
          curveness: 0.22,
          type: 'dashed'
        },
        data: trailData,
        silent: true
      },
      // 3. 城市灯火（脉冲光点 + 标签）
      {
        type: 'effectScatter',
        coordinateSystem: 'geo',
        zlevel: 2,
        data: lanternData,
        symbolSize: (val) => 8 + Math.min(val[2], 10) * 1.2,
        rippleEffect: { brushType: 'stroke', scale: 4, period: 4 },
        itemStyle: {
          color: '#D65A31',
          shadowColor: '#D65A31',
          shadowBlur: 18,
          opacity: 0.95
        },
        label: {
          show: true,
          formatter: '{b}',
          position: 'right',
          color: '#EEEEEE',
          fontFamily: 'Noto Serif SC',
          fontSize: 12,
          fontWeight: 600,
          backgroundColor: 'rgba(34,40,49,0.88)',
          padding: [3, 8],
          borderRadius: 2,
          borderColor: 'rgba(214,90,49,0.25)',
          borderWidth: 1
        },
        emphasis: { scale: 1.4 }
      }
    ]
  });

  chart.off('click');
  chart.on('click', (params) => {
    const name = params.data?.province || params.name;
    if (dataMap[name]) openDetail(name);
  });

  chart.off('mouseover');
  chart.on('mouseover', (p) => {
    const name = p.data?.province || p.name;
    if (dataMap[name]) mapTip.classList.add('show');
  });
  chart.off('mouseout');
  chart.on('mouseout', () => mapTip.classList.remove('show'));
}

window.addEventListener('resize', () => chart && chart.resize());

/* ====================== 省份详情 ====================== */

const detailPanel = document.getElementById('detailPanel');
const detailContent = document.getElementById('detailContent');
let currentPhotos = [];
let currentIndex = 0;

function openDetail(province) {
  const d = dataMap[province];
  if (!d) return;

  currentPhotos = d.photos;

  detailContent.innerHTML = `
    <div class="detail-header">
      <div class="detail-eyebrow">${d.province}</div>
      <h1 class="detail-title">${d.display} · 旅行记</h1>
      <div class="detail-meta">
        <span>🗓 ${d.period}</span>
        <span>📷 ${d.photos.length} 张照片</span>
      </div>
    </div>
    <div class="detail-diary">
      ${d.diary.map(p => `<p>${p}</p>`).join('')}
    </div>
    <div class="gallery">
      ${d.photos.map((p, i) => `
        <div class="photo" onclick="openLightbox(${i})">
          <img src="${p.src}" alt="${p.caption}" loading="lazy">
          <div class="photo-meta">
            <div class="photo-caption">${p.caption}</div>
            <div class="photo-info">
              <span>📍 ${p.location}</span>
              <span>⏱ ${p.time}</span>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  detailPanel.classList.add('open');
  document.body.style.overflow = 'hidden';
  detailPanel.scrollTop = 0;
}

function closeDetail() {
  detailPanel.classList.remove('open');
  document.body.style.overflow = '';
}

/* ====================== 灯箱 ====================== */

const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxCaption = document.getElementById('lightboxCaption');

function openLightbox(index) {
  currentIndex = index;
  showLightboxImage();
  lightbox.classList.add('open');
}
function showLightboxImage() {
  const p = currentPhotos[currentIndex];
  lightboxImg.src = p.src;
  lightboxCaption.innerHTML = `${p.caption}<small>${p.location} · ${p.time}</small>`;
}
function navLightbox(delta) {
  currentIndex = (currentIndex + delta + currentPhotos.length) % currentPhotos.length;
  showLightboxImage();
}
function closeLightbox() {
  lightbox.classList.remove('open');
}
lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) closeLightbox();
});
document.addEventListener('keydown', (e) => {
  if (!lightbox.classList.contains('open')) {
    if (e.key === 'Escape' && detailPanel.classList.contains('open')) closeDetail();
    return;
  }
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

/* ====================== 上传抽屉 ====================== */

const drawer = document.getElementById('drawer');
const drawerBackdrop = document.getElementById('drawerBackdrop');
const fabBtn = document.getElementById('fabBtn');
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const provinceSelect = document.getElementById('provinceSelect');
const newProvinceField = document.getElementById('newProvinceField');
const queueEl = document.getElementById('queue');
const toastEl = document.getElementById('toast');

let uploadQueue = [];

function openDrawer() {
  drawer.classList.add('open');
  drawerBackdrop.classList.add('open');
  renderProvinceSelect();
}
function closeDrawer() {
  drawer.classList.remove('open');
  drawerBackdrop.classList.remove('open');
}
fabBtn.onclick = openDrawer;

function renderProvinceSelect() {
  const sel = provinceSelect;
  const cur = sel.value;
  sel.innerHTML = '<option value="">— 选择已有省份 —</option>' +
    TRAVEL_DATA.map(d => `<option value="${d.province}">${d.display}（${d.province}）</option>`).join('') +
    '<option value="__new__">+ 新增省份</option>';
  if (cur) sel.value = cur;
}
provinceSelect.onchange = () => {
  newProvinceField.style.display = provinceSelect.value === '__new__' ? '' : 'none';
  const d = dataMap[provinceSelect.value];
  if (d) {
    document.getElementById('periodInput').value = d.period;
    document.getElementById('diaryInput').value = d.diary.join('\n');
  }
};

// Tab 切换
document.querySelectorAll('.drawer-tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.drawer-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('uploadTab').style.display = t.dataset.tab === 'upload' ? '' : 'none';
    document.getElementById('urlTab').style.display = t.dataset.tab === 'url' ? '' : 'none';
  };
});

// 文件拖拽
dropZone.onclick = () => fileInput.click();
fileInput.onchange = (e) => handleFiles(e.target.files);
['dragenter', 'dragover'].forEach(ev => dropZone.addEventListener(ev, e => {
  e.preventDefault(); dropZone.classList.add('dragging');
}));
['dragleave', 'drop'].forEach(ev => dropZone.addEventListener(ev, e => {
  e.preventDefault(); dropZone.classList.remove('dragging');
}));
dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));

function handleFiles(files) {
  Array.from(files).forEach(f => {
    if (!f.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      uploadQueue.push({
        src: ev.target.result,
        caption: f.name.replace(/\.[^.]+$/, ''),
        location: '',
        time: new Date().toISOString().slice(0, 16).replace('T', ' ')
      });
      renderQueue();
    };
    reader.readAsDataURL(f);
  });
}

function addUrlsToQueue() {
  const lines = document.getElementById('urlInput').value
    .split('\n').map(s => s.trim()).filter(Boolean);
  lines.forEach(url => uploadQueue.push({
    src: url, caption: '', location: '', time: ''
  }));
  document.getElementById('urlInput').value = '';
  renderQueue();
}

function renderQueue() {
  queueEl.innerHTML = uploadQueue.map((p, i) => `
    <div class="queue-item">
      <img class="queue-thumb" src="${p.src}" alt="" onerror="this.style.opacity=0.3">
      <div class="queue-body">
        <input data-k="caption" data-i="${i}" placeholder="一句话描述..." value="${escapeAttr(p.caption)}">
        <input data-k="location" data-i="${i}" placeholder="拍摄地点" value="${escapeAttr(p.location)}">
        <input data-k="time" data-i="${i}" placeholder="拍摄时间" value="${escapeAttr(p.time)}">
      </div>
      <button class="queue-remove" onclick="removeFromQueue(${i})">×</button>
    </div>
  `).join('');
  queueEl.querySelectorAll('input').forEach(inp => {
    inp.oninput = e => {
      uploadQueue[+e.target.dataset.i][e.target.dataset.k] = e.target.value;
    };
  });
}
function removeFromQueue(i) { uploadQueue.splice(i, 1); renderQueue(); }

function escapeAttr(s) { return String(s || '').replace(/"/g, '&quot;'); }

function saveProvince() {
  let province = provinceSelect.value;
  let display;
  if (province === '__new__') {
    province = document.getElementById('newProvinceInput').value.trim();
    if (!province) return showToast('请填写省份名');
    display = province.replace(/(省|市|自治区|特别行政区|维吾尔|壮族|回族)/g, '').trim() || province;
  } else if (!province) {
    return showToast('请选择省份');
  } else {
    display = dataMap[province].display;
  }
  const period = document.getElementById('periodInput').value.trim() || '近期';
  const diary = document.getElementById('diaryInput').value.split('\n').map(s => s.trim()).filter(Boolean);

  let entry = dataMap[province];
  if (!entry) {
    entry = { province, display, period, diary, photos: [] };
    TRAVEL_DATA.push(entry);
  } else {
    entry.period = period;
    if (diary.length) entry.diary = diary;
  }
  entry.photos.push(...uploadQueue);
  uploadQueue = [];

  saveData();
  refreshAll();
  closeDrawer();
  document.getElementById('periodInput').value = '';
  document.getElementById('diaryInput').value = '';
  document.getElementById('newProvinceInput').value = '';
  showToast(`已保存到 ${display} · 共 ${entry.photos.length} 张照片`);
}

function exportData() {
  const blob = new Blob([JSON.stringify(TRAVEL_DATA, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `travel-data-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('已导出 JSON');
}
function importData(e) {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const arr = JSON.parse(ev.target.result);
      if (!Array.isArray(arr)) throw new Error('格式不正确');
      TRAVEL_DATA = arr;
      saveData();
      refreshAll();
      showToast('已导入数据');
    } catch (err) { showToast('导入失败：' + err.message); }
  };
  reader.readAsText(f);
}
function resetData() {
  if (!confirm('重置为示例数据？本地保存将被清除。')) return;
  localStorage.removeItem('travel_data_v1');
  TRAVEL_DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
  saveData();
  refreshAll();
  showToast('已恢复示例数据');
}

let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
}

// 首次渲染
refreshAll();

</script>
</body>
</html>
